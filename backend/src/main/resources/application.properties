spring.application.name=equipment-management

# Database Configuration (Overrides via .env or Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Local Backup (Commented out)
# spring.datasource.url=jdbc:postgresql://localhost:5432/equipment_db
# spring.datasource.username=postgres
# spring.datasource.password=Charan100%

# JPA — schema is automatically updated to handle any missing tables/columns
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server
server.port=8081

# Logging
logging.level.com.equipment=DEBUG
logging.level.org.springframework.web=INFO
